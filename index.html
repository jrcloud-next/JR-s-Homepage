<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JR's Homepage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background-color: #0a0a0a;
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
            position: relative;
        }
        
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: -1;
            transition: background-image 1s ease;
        }
        
        .container {
            max-width: 900px;
            width: 90%;
            text-align: center;
            padding: 50px 30px;
            background-color: rgba(20, 20, 30, 0.6);
            border-radius: 24px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            animation: fadeIn 1.2s ease;
            position: relative;
            overflow: hidden;
        }
        
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .avatar-container {
            position: relative;
            display: inline-block;
            margin-bottom: 25px;
        }
        
        .avatar {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255, 255, 255, 0.25);
            transition: all 0.4s ease;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }
        
        .avatar:hover {
            transform: scale(1.08);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }
        
        .name {
            font-size: 3.5rem;
            margin-bottom: 10px;
            font-weight: 300;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #fff 0%, #a8c0ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
        }
        
        .tagline {
            font-size: 1.8rem;
            margin-bottom: 40px;
            color: #e0e0ff;
            font-weight: 300;
            line-height: 1.6;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            letter-spacing: 2px;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.5);
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 25px;
            margin-top: 40px;
        }
        
        .social-link {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: #fff;
            width: 110px;
            padding: 20px 15px;
            border-radius: 16px;
            background-color: rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
        }
        
        .social-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.15) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        
        .social-link:hover {
            transform: translateY(-8px);
            background-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 25px rgba(0, 0, 0, 0.25);
        }
        
        .social-link:hover::before {
            opacity: 1;
        }
        
        .social-icon {
            font-size: 2.2rem;
            margin-bottom: 12px;
            transition: transform 0.3s ease;
        }
        
        .social-link:hover .social-icon {
            transform: scale(1.2);
        }
        
        .social-name {
            font-size: 1rem;
            font-weight: 500;
        }
        
        .footer {
            margin-top: 60px;
            color: #aaa;
            font-size: 0.95rem;
            padding-top: 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .year-highlight {
            color: #a8c0ff;
            font-weight: 500;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 40px 20px;
                background-color: rgba(20, 20, 30, 0.7);
            }
            
            .name {
                font-size: 2.8rem;
            }
            
            .tagline {
                font-size: 1.5rem;
            }
            
            .social-links {
                gap: 15px;
            }
            
            .social-link {
                width: 90px;
                padding: 15px 10px;
            }
            
            .social-icon {
                font-size: 1.8rem;
            }
        }
        
        @media (max-width: 480px) {
            .name {
                font-size: 2.2rem;
            }
            
            .tagline {
                font-size: 1.3rem;
            }
            
            .avatar {
                width: 140px;
                height: 140px;
            }
            
            .social-links {
                gap: 10px;
            }
            
            .social-link {
                width: 80px;
                padding: 12px 8px;
            }
            
            .social-icon {
                font-size: 1.6rem;
            }
            
            .social-name {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <div class="background" id="background"></div>
    
    <div class="container">
        <div class="avatar-container">
            <img src="jr.jpg" alt="JR" class="avatar">
        </div>
        <h1 class="name">JR</h1>
        <p class="tagline">这一生志愿只要平凡快乐</p>
        <p class="tagline">谁说这样不伟大呢</p>
        <div class="social-links">
            <a href="https://qm.qq.com/q/oj2XiX2B9u" class="social-link" target="_blank">
                <div class="social-icon"><i class="fab fa-qq"></i></div>
                <div class="social-name">QQ</div>
            </a>
            <a href="https://m.bilibili.com/space/621473799" class="social-link" target="_blank">
                <div class="social-icon"><i class="fab fa-bilibili"></i></div>
                <div class="social-name">哔哩哔哩</div>
            </a>
            <a href="http://www.coolapk.com/u/8375906" class="social-link" target="_blank">
                <div class="social-icon"><i class="fas fa-mobile-alt"></i></div>
                <div class="social-name">酷安</div>
            </a>
            <a href="https://github.com/jrcloud-next" class="social-link" target="_blank">
                <div class="social-icon"><i class="fab fa-github"></i></div>
                <div class="social-name">GitHub</div>
            </a>
        </div>
        
        <div class="footer">
            <p>© <span class="year-highlight" id="current-year"></span> · JR</p>
        </div>
    </div>

    <script>
        // 动态获取必应壁纸作为背景
        const background = document.getElementById('background');
        
        // 根据设备类型选择不同的API
        function getBingWallpaperUrl() {
            if (/Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent)) {
                return 'https://bing.img.run/m.php';
            } else {
                return 'https://bing.img.run/1920x1080.php';
            }
        }
        
        // 设置背景图片
        function setBackgroundImage() {
            const wallpaperUrl = getBingWallpaperUrl();
            const img = new Image();
            
            img.onload = function() {
                background.style.backgroundImage = `url(${wallpaperUrl})`;
            };
            
            img.onerror = function() {
                // 如果API失败，使用默认的渐变背景
                background.style.backgroundImage = 'linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%)';
            };
            
            img.src = wallpaperUrl;
        }
        
        // 更新年份
        function updateYear() {
            const yearElement = document.getElementById('current-year');
            const currentYear = new Date().getFullYear();
            yearElement.textContent = currentYear;
        }
        
        // 初始化
        setBackgroundImage();
        updateYear();
        
        // 可选：每天更换背景
        // setInterval(setBackgroundImage, 24 * 60 * 60 * 1000);
    </script>
</body>
</html>
