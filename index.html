<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="JR的个人主页">
    <title>JR's Homepage</title>
    <link rel="stylesheet" href="./assets/vendor/fontawesome/css/all.min.css">
    <link rel="stylesheet" href="./assets/css/style.css">
</head>
<body>
    <div class="background" id="background" aria-hidden="true"></div>

    <main class="container">
        <div class="avatar-container">
            <img src="jr.jpg" alt="JR" class="avatar" loading="lazy">
        </div>

        <div class="badge-row">
            <span class="status-dot" aria-hidden="true"></span>
            <span id="greeting-text">你好，欢迎来访</span>
        </div>

        <p class="tagline quote-text">
            <span class="quote-line">这一生志愿只要平凡快乐</span>
            <span class="quote-line">谁说这样不伟大呢</span>
        </p>
        <p class="clock" id="clock-text" aria-live="polite"></p>

        <section class="social-links" aria-label="社交链接">
            <a href="https://qm.qq.com/q/oj2XiX2B9u" class="social-link" target="_blank" rel="noopener noreferrer">
                <span class="social-icon"><i class="fab fa-qq" aria-hidden="true"></i></span>
                <span class="social-name">QQ</span>
            </a>
            <a href="https://m.bilibili.com/space/621473799" class="social-link" target="_blank" rel="noopener noreferrer">
                <span class="social-icon"><i class="fab fa-bilibili" aria-hidden="true"></i></span>
                <span class="social-name">哔哩哔哩</span>
            </a>
            <a href="http://www.coolapk.com/u/8375906" class="social-link" target="_blank" rel="noopener noreferrer">
                <span class="social-icon"><i class="fas fa-mobile-alt" aria-hidden="true"></i></span>
                <span class="social-name">酷安</span>
            </a>
            <a href="https://github.com/jrcloud-next" class="social-link" target="_blank" rel="noopener noreferrer">
                <span class="social-icon"><i class="fab fa-github" aria-hidden="true"></i></span>
                <span class="social-name">GitHub</span>
            </a>
        </section>

        <footer class="footer">
            <p>© <span class="year-highlight" id="current-year"></span> · JR</p>
        </footer>
    </main>

    <script src="./assets/js/main.js"></script>
</body>
</html>
